<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrysmisAI - Account</title>
<link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="container">
<div class="card">
<div class="tabs">
<button class="tab active" onclick="showTab('create')">Create Account</button>
<button class="tab" onclick="showTab('login')">Account Login</button>
</div>
<div id="createTab" class="tab-content">
<h1>Create Account</h1>
<p>Initialize your PrysmisAI profile</p>
<input type="text" id="createUsername" placeholder="Username" autocomplete="off">
<input type="password" id="createPassword" placeholder="Password" autocomplete="off">
<button id="createBtn">Create Account</button>
</div>
<div id="loginTab" class="tab-content" style="display:none">
<h1>Account Login</h1>
<p>Login to your PrysmisAI profile</p>
<input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="off">
<input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="off">
<button id="loginBtn">Login to account</button>
</div>
</div>
</div>
<script src="auth.js"></script>
</body>
</html>
