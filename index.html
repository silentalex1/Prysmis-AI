<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prysmi's AI - Free Claude Wrapper (Static)</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #0f0f1a; color: #e0e0ff; }
    textarea, input, button { width: 100%; margin: 10px 0; padding: 10px; }
    #response { white-space: pre-wrap; background: #1a1a2e; padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Prysmi's Free Claude AI (No Key Needed)</h1>
  <p>Powered by Puter.js • Models like claude-opus-4-6, claude-sonnet-4-5, etc. • Truly static & automatic</p>

  <label>Model:</label>
  <select id="model">
    <option value="claude-opus-4-6">Claude Opus 4.6 (flagship)</option>
    <option value="claude-sonnet-4-6" selected>Claude Sonnet 4.6 (best balance)</option>
    <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
    <option value="claude-opus-4-5">Claude Opus 4.5</option>
    <option value="claude-haiku-4-5">Claude Haiku 4.5 (fast)</option>
  </select>

  <textarea id="prompt" rows="6" placeholder="Ask anything... e.g., 'Explain quantum entanglement like I'm 5'"></textarea>
  <button onclick="sendPrompt()">Send to Claude</button>

  <div id="response">Response will appear here...</div>

  <script>
    async function sendPrompt() {
      const prompt = document.getElementById('prompt').value.trim();
      const model = document.getElementById('model').value;
      const respDiv = document.getElementById('response');
      if (!prompt) return alert("Enter a prompt!");

      respDiv.innerHTML = "Thinking... (user-pays model via Puter — free for you)";

      try {
        const response = await puter.ai.chat(prompt, { model });
        respDiv.innerHTML = response.message.content[0].text;
      } catch (err) {
        respDiv.innerHTML = "Error: " + err.message + "\n\n(Puter.js may require user auth on first use — check console)";
      }
    }
  </script>
</body>
</html>
