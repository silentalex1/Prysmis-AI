<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrysmisAI - Builder Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<header>
<div class="logo">PrysmisAI Builder</div>
<div class="right">
<select id="modelSelect">
<option>Claude Opus 4.6</option>
<option>Gemini 3.2</option>
<option>ChatGPT 5.2</option>
</select>
<button id="connectBtn">Connect Plugin</button>
</div>
</header>
<div class="main">
<aside class="sidebar">
<h3>Project Explorer</h3>
<div>Workspace</div>
<div>Starter Scripts</div>
<div>ReplicatedStorage</div>
</aside>
<main>
<div id="chatArea"></div>
<div class="input-area">
<textarea id="input" placeholder="Ask Claude Opus 4.6, Gemini 3.2, or GPT-5.2 to build..."></textarea>
<button id="sendBtn">Send</button>
</div>
</main>
</div>
<script src="dashboard.js"></script>
</body>
</html>
