<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrysmisAI Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/adminpanel/admin.css">
</head>
<body>
<div class="gate-overlay" id="gateOverlay" style="display:none">
<div class="gate-card">
<div class="gate-logo">PrysmisAI</div>
<h2 class="gate-title">Admin Access Required</h2>
<p class="gate-sub">Enter the admin code generated by the Discord bot</p>
<div class="gate-group">
<label class="gate-label">ADMIN PASSCODE</label>
<input type="text" id="gateCode" class="gate-input" placeholder="PrysmisAI_admin..." autocomplete="off" spellcheck="false">
</div>
<div id="gateErr" class="gate-err"></div>
<button class="gate-btn" id="gateBtn">
<span id="gateBtnText">Access Admin Panel</span>
<span id="gateSpinner" class="spinner" style="display:none"></span>
</button>
</div>
</div>
<div class="admin-layout" id="adminLayout" style="display:none">
<aside class="admin-sidebar">
<div class="admin-brand">
<span class="admin-logo">PrysmisAI</span>
<span class="admin-badge">ADMIN</span>
</div>
<nav class="admin-nav">
<button class="admin-nav-btn active" id="navStats" onclick="showPage('stats')">
<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
Website Stats
</button>
<button class="admin-nav-btn" id="navControl" onclick="showPage('control')">
<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
Admin Control
</button>
</nav>
</aside>
<div class="admin-main">
<header class="admin-header">
<div class="admin-header-left">
<h1 id="pageTitle">Website Stats</h1>
</div>
<div class="admin-header-right">
<span class="admin-user-tag" id="adminUserTag"></span>
<button class="admin-logout-btn" id="adminLogoutBtn">Admin Logout</button>
</div>
</header>
<main class="admin-content">
<section id="pageStats" class="admin-page">
<div class="stats-grid">
<div class="stat-card">
<div class="stat-icon">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
</div>
<div class="stat-info">
<div class="stat-value" id="statUsers">-</div>
<div class="stat-label">Total Users</div>
</div>
</div>
<div class="stat-card">
<div class="stat-icon stat-icon-green">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
</div>
<div class="stat-info">
<div class="stat-value" id="statActive">-</div>
<div class="stat-label">Active Sessions</div>
</div>
</div>
<div class="stat-card">
<div class="stat-icon stat-icon-purple">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
</div>
<div class="stat-info">
<div class="stat-value" id="statProjects">-</div>
<div class="stat-label">Community Projects</div>
</div>
</div>
<div class="stat-card">
<div class="stat-icon stat-icon-red">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
</div>
<div class="stat-info">
<div class="stat-value" id="statAdmins">-</div>
<div class="stat-label">Admin Accounts</div>
</div>
</div>
</div>
<div class="users-table-wrap">
<div class="users-table-header">
<h2>Registered Users</h2>
<button class="refresh-btn" id="refreshBtn" onclick="loadStats()">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
Refresh
</button>
</div>
<div id="usersTableBody" class="users-table-body">
<div class="table-loading">Loading users...</div>
</div>
</div>
</section>
<section id="pageControl" class="admin-page">
<div class="control-header-row">
<div class="control-stat">
<span class="control-stat-value" id="controlUserCount">-</span>
<span class="control-stat-label">Verified Users</span>
</div>
</div>
<div class="users-table-wrap" style="margin-top:1.5rem">
<div class="users-table-header">
<h2>User Accounts</h2>
<button class="refresh-btn" onclick="loadControl()">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
Refresh
</button>
</div>
<div id="controlTableBody" class="users-table-body">
<div class="table-loading">Loading...</div>
</div>
</div>
</section>
</main>
</div>
</div>
<script src="/adminpanel/admin.js"></script>
</body>
</html>
