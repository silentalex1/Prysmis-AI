<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrysmisAI - Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="bg-[#0a0a0b] text-white overflow-hidden">

    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>
    </div>

    <div class="relative z-10 w-full max-w-[400px] px-6">
        
        <a href="/" class="group inline-flex items-center gap-3 text-[11px] font-bold uppercase tracking-[0.2em] text-white/30 hover:text-blue-400 transition-all mb-10">
            <span class="flex items-center justify-center w-8 h-8 rounded-full border border-white/5 bg-white/[0.02] group-hover:border-blue-500/50 group-hover:bg-blue-500/10 transition-all">←</span> 
            go back
        </a>

        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-8 h-8 bg-blue-600 rotate-45 shadow-[0_0_20px_rgba(37,99,235,0.4)]"></div>
            <span class="font-['Syne'] text-xl font-bold tracking-tight">Prysmis<span class="text-blue-500">AI</span></span>
        </div>

        <div class="bg-[#111113]/50 backdrop-blur-xl border border-white/5 rounded-[24px] overflow-hidden shadow-2xl">
            <div class="flex border-b border-white/5">
                <button id="user-tab" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest transition-all text-blue-500 bg-blue-500/5">User</button>
                <button id="admin-tab" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest transition-all text-white/20 hover:text-white/40">Admin Panel</button>
            </div>

            <div id="user-section" class="p-8">
                <h1 class="font-['Syne'] text-2xl font-bold text-center mb-8">Create your account</h1>

                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-white/30 mb-2 ml-1">Enter in your username:</label>
                        <input type="text" id="username" class="w-full bg-black/20 border border-white/5 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-blue-500/50 transition-all" placeholder="username">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-white/30 mb-2 ml-1">Enter in your password:</label>
                        <input type="password" id="password" class="w-full bg-black/20 border border-white/5 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-blue-500/50 transition-all" placeholder="••••••••">
                    </div>

                    <p id="user-error" class="text-red-500/80 text-[11px] text-center hidden"></p>

                    <div class="text-center pt-2">
                        <p class="text-[12px] text-white/30">
                            Already have an account? <a href="/loginauth/index.html" class="text-blue-500 font-bold hover:underline">click here.</a>
                        </p>
                    </div>

                    <button id="create-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-['Syne'] font-bold text-sm transition-all shadow-[0_10px_20px_rgba(37,99,235,0.15)] active:scale-[0.98]">
                        Create account.
                    </button>
                </div>
            </div>

            <div id="admin-section" class="p-8 hidden">
                <h1 class="font-['Syne'] text-2xl font-bold text-center mb-2">Admin Login</h1>
                <p class="text-[11px] text-red-500/60 text-center uppercase tracking-widest mb-8">This is for admins only.</p>

                <div class="space-y-5">
                    <input type="text" id="admin-username" class="w-full bg-black/20 border border-white/5 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-blue-500/50 transition-all" placeholder="Admin Username">
                    <input type="password" id="admin-password" class="w-full bg-black/20 border border-white/5 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-blue-500/50 transition-all" placeholder="Admin Password">
                    <input type="text" id="admin-code" class="w-full bg-black/20 border border-white/5 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-blue-500/50 transition-all" placeholder="Admin Secret Code">
                    
                    <p id="admin-error" class="text-red-500/80 text-[11px] text-center hidden"></p>

                    <button id="admin-btn" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 py-4 rounded-xl font-['Syne'] font-bold text-sm transition-all active:scale-[0.98]">
                        Login to admin panel.
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
