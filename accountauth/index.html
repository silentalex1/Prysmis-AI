<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrysmisAI - Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-bg">
        <div class="auth-glow"></div>
    </div>

    <div class="auth-wrap">

        <div class="auth-logo">
            <div class="auth-prism">
                <div class="ap-ring ap-r1"></div>
                <div class="ap-ring ap-r2"></div>
                <div class="ap-dot"></div>
            </div>
            <span>Prysmis<b>AI</b></span>
        </div>

        <div class="auth-card">

            <div class="auth-tabs">
                <button id="user-tab" class="auth-tab active">User</button>
                <button id="admin-tab" class="auth-tab">Admin Panel</button>
            </div>

            <div id="user-section" class="auth-body">
                <h1 class="auth-title">Create your account</h1>

                <div class="field-group">
                    <label class="field-label">Enter in your username:</label>
                    <input type="text" class="field-input" placeholder="username">
                </div>

                <div class="field-group">
                    <label class="field-label">Enter in your password:</label>
                    <input type="password" class="field-input" placeholder="••••••••">
                </div>

                <p class="auth-sub">
                    Already have an account? <a href="https://login.PrysmisAI.wtf">click here.</a>
                </p>

                <button id="create-btn" class="auth-btn primary">Create account.</button>
            </div>

            <div id="admin-section" class="auth-body hidden">
                <h1 class="auth-title">Admin Login</h1>
                <p class="auth-warning">This is for admins only.</p>

                <div class="field-group">
                    <label class="field-label">Enter admin username:</label>
                    <input type="text" class="field-input" placeholder="admin username">
                </div>

                <div class="field-group">
                    <label class="field-label">Enter admin password:</label>
                    <input type="password" class="field-input" placeholder="••••••••">
                </div>

                <div class="field-group">
                    <label class="field-label">Enter admin code:</label>
                    <input type="text" class="field-input" placeholder="admin code">
                </div>

                <button class="auth-btn secondary">Login to admin panel.</button>
            </div>

        </div>

    </div>

    <script src="auth.js"></script>
</body>
</html>
