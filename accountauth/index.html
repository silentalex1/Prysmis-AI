<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrysmisAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="page">
<a href="/" class="back-link">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
Back to home
</a>
<div class="auth-card">
<div class="card-inner" id="loginCard">
<h1>Welcome back</h1>
<p class="subtitle">Sign in to continue building</p>
<div class="tab-row">
<button class="tab-pill active" onclick="switchTab('login')">Log In</button>
<button class="tab-pill" onclick="switchTab('signup')">Sign Up</button>
<button class="tab-pill" onclick="switchTab('admin')">Admin</button>
</div>
<div class="form-group">
<label>USERNAME</label>
<input type="text" id="loginUser" placeholder="Enter your username" autocomplete="off" spellcheck="false">
</div>
<div class="form-group">
<label>PASSWORD</label>
<div class="pw-wrap">
<input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password">
<button type="button" class="eye-btn" onclick="toggleEye('loginPass')">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
</button>
</div>
</div>
<div id="loginErr" class="err-msg"></div>
<button class="submit-btn" id="loginBtn">
<span id="loginBtnText">Log In</span>
<span id="loginSpinner" class="spinner" style="display:none"></span>
</button>
<p class="switch-text">Don't have an account? <button class="link-btn" onclick="switchTab('signup')">Sign up</button></p>
</div>
<div class="card-inner" id="signupCard" style="display:none">
<h1>Create account</h1>
<p class="subtitle">Start building with PrysmisAI</p>
<div class="tab-row">
<button class="tab-pill" onclick="switchTab('login')">Log In</button>
<button class="tab-pill active" onclick="switchTab('signup')">Sign Up</button>
<button class="tab-pill" onclick="switchTab('admin')">Admin</button>
</div>
<div class="form-group">
<label>USERNAME</label>
<input type="text" id="signupUser" placeholder="Choose a username" autocomplete="off" spellcheck="false">
</div>
<div class="form-group">
<label>PASSWORD</label>
<div class="pw-wrap">
<input type="password" id="signupPass" placeholder="At least 6 characters" autocomplete="new-password">
<button type="button" class="eye-btn" onclick="toggleEye('signupPass')">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
</button>
</div>
</div>
<div id="signupErr" class="err-msg"></div>
<button class="submit-btn" id="signupBtn">
<span id="signupBtnText">Sign Up</span>
<span id="signupSpinner" class="spinner" style="display:none"></span>
</button>
<p class="switch-text">Already have an account? <button class="link-btn" onclick="switchTab('login')">Log in</button></p>
</div>
<div class="card-inner" id="adminCard" style="display:none">
<h1>Admin Panel</h1>
<p class="subtitle">Authorized personnel only</p>
<div class="tab-row">
<button class="tab-pill" onclick="switchTab('login')">Log In</button>
<button class="tab-pill" onclick="switchTab('signup')">Sign Up</button>
<button class="tab-pill active" onclick="switchTab('admin')">Admin</button>
</div>
<div class="admin-sub-tabs">
<button class="admin-sub-pill active" id="adminSubLogin" onclick="switchAdminSub('login')">Sign In</button>
<button class="admin-sub-pill" id="adminSubCreate" onclick="switchAdminSub('create')">Create Account</button>
</div>
<div id="adminLoginForm">
<div class="form-group">
<label>ADMIN USERNAME</label>
<input type="text" id="adminUser" placeholder="Enter admin username" autocomplete="off" spellcheck="false">
</div>
<div class="form-group">
<label>ADMIN PASSWORD</label>
<div class="pw-wrap">
<input type="password" id="adminPass" placeholder="Enter admin password" autocomplete="current-password">
<button type="button" class="eye-btn" onclick="toggleEye('adminPass')">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
</button>
</div>
</div>
<div id="adminErr" class="err-msg"></div>
<button class="submit-btn admin-submit" id="adminBtn">
<span id="adminBtnText">Admin Login</span>
<span id="adminSpinner" class="spinner" style="display:none"></span>
</button>
</div>
<div id="adminCreateForm" style="display:none">
<div class="form-group">
<label>ADMIN USERNAME</label>
<input type="text" id="createAdminUser" placeholder="Enter your website username" autocomplete="off" spellcheck="false">
</div>
<div class="form-group">
<label>SET ADMIN PASSWORD</label>
<div class="pw-wrap">
<input type="password" id="createAdminPass" placeholder="Create a password (min 6 chars)" autocomplete="new-password">
<button type="button" class="eye-btn" onclick="toggleEye('createAdminPass')">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
</button>
</div>
</div>
<div class="form-group">
<label>ADMIN CODE</label>
<input type="text" id="createAdminCode" placeholder="Enter code from Discord bot" autocomplete="off" spellcheck="false">
</div>
<div id="createAdminErr" class="err-msg"></div>
<button class="submit-btn admin-submit" id="createAdminBtn">
<span id="createAdminBtnText">Create Admin Account</span>
<span id="createAdminSpinner" class="spinner" style="display:none"></span>
</button>
</div>
<p class="switch-text admin-note">Codes are generated via Discord bot by authorized users only.</p>
</div>
</div>
</div>
<script src="auth.js"></script>
</body>
</html>
